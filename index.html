<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNC Chapel Hill</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #7BA7D1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            position: relative;
        }

        .school-logo {
            width: 300px;
            height: auto;
            margin-bottom: 20px;
        }

        .school-name {
            color: white;
            font-size: 42px;
            font-weight: bold;
            margin: 0;
            text-align: center;
        }

        footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <img src="unc.png" alt="UNC Chapel Hill Logo" class="school-logo">
    <h1 class="school-name">University of North Carolina at Chapel Hill</h1>

    <footer>
        Contact: houzh@unc.edu
    </footer>
</body>
</html>
